<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>it-guru</title>
    <script>
      // GitHub Pages SPA redirect: restore path from query param set by 404.html
      (function () {
        var p = window.location.search.slice(1);
        if (p.indexOf('p=') === 0) {
          var path = p.slice(2).replace(/~and~/g, '&');
          var qs = path.indexOf('&q=');
          var query = qs !== -1 ? '?' + path.slice(qs + 3).replace(/~and~/g, '&') : '';
          path = qs !== -1 ? path.slice(0, qs) : path;
          window.history.replaceState(null, null, '/' + path + query + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
